name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use latest npm for OIDC
        run: npm install -g npm@latest

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check packages
        run: corepack pnpm -r check

      - name: Pack packages
        run: |
          PACK_DIR="$GITHUB_WORKSPACE/dist-packages"
          mkdir -p "$PACK_DIR"
          corepack pnpm --dir packages/core pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/html pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/myst pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/react pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/vue pack --pack-destination "$PACK_DIR"
          ls -la "$PACK_DIR"

      - name: Publish packages
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          shopt -s nullglob

          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Using NPM_TOKEN fallback for publish authentication."
          else
            echo "Using npm trusted publishing via OIDC."
          fi

          packages=(
            ./dist-packages/*.tgz
          )

          test "${#packages[@]}" -gt 0

          for package in "${packages[@]}"
          do
            npm publish "$package" --access public
          done
