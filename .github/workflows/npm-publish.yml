name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use latest npm for OIDC
        run: npm install -g npm@latest

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check packages
        run: corepack pnpm -r check

      - name: Pack packages
        run: |
          PACK_DIR="$GITHUB_WORKSPACE/dist-packages"
          mkdir -p "$PACK_DIR"
          corepack pnpm --dir packages/core pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/html pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/myst pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/react pack --pack-destination "$PACK_DIR"
          corepack pnpm --dir packages/vue pack --pack-destination "$PACK_DIR"
          ls -la "$PACK_DIR"

      - name: Publish packages
        run: |
          set -euo pipefail
          for package in \
            "$GITHUB_WORKSPACE"/dist-packages/pyodide-editable-core-*.tgz \
            "$GITHUB_WORKSPACE"/dist-packages/pyodide-editable-html-*.tgz \
            "$GITHUB_WORKSPACE"/dist-packages/pyodide-editable-myst-*.tgz \
            "$GITHUB_WORKSPACE"/dist-packages/pyodide-editable-react-*.tgz \
            "$GITHUB_WORKSPACE"/dist-packages/pyodide-editable-vue-*.tgz
          do
            test -f "$package"
            npm publish "$package" --access public
          done
