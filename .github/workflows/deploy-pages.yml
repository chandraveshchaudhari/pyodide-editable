name: Deploy demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - id: deployment_primary
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - id: deployment_retry
        if: steps.deployment_primary.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail if both deploy attempts failed
        if: steps.deployment_primary.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed twice."
          exit 1